name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'vagrant/app/backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./vagrant/app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:${{ github.sha }}

  deploy-k8s:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Set deployment image to exact version
        run: |
          kubectl set image deployment/backend-deployment backend=${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:${{ github.sha }}
          kubectl rollout status deployment/backend-deployment

  deploy-ec2:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy on EC2
        run: |
          cd ~/app-deploy
          docker-compose pull
          docker-compose up -d
          docker image prune -f
